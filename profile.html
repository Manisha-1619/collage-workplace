{% extends "base.html" %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="glass-card p-5 animate-fade-in">
                <h2 class="mb-4 fw-bold"><i class="bi bi-person-circle text-primary me-2"></i>Profile Settings</h2>
                <p class="text-secondary mb-4">Manage your account details and security settings.</p>

                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-3">
                        <label class="form-label text-secondary">Username</label>
                        <input type="text" class="form-control bg-dark text-white border-secondary"
                            value="{{ current_user.username }}" disabled>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label text-secondary">Email Address</label>
                        <input type="email" class="form-control bg-dark text-white border-secondary" id="email"
                            name="email" value="{{ current_user.email }}" required>
                    </div>
                    <hr class="border-secondary my-4">
                    <div class="mb-4">
                        <label for="password" class="form-label text-secondary">New Password (leave blank to keep
                            current)</label>
                        <input type="password" class="form-control bg-dark text-white border-secondary" id="password"
                            name="password">
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2">Update Profile</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
