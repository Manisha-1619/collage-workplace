{% extends "base.html" %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <!-- Animated Cyber Register Card -->
            <div class="cyber-register-card">
                <!-- Scanning Lines -->
                <div class="scan-line scan-1"></div>
                <div class="scan-line scan-2"></div>
                
                <!-- Floating Particles -->
                <div class="floating-particles">
                    <span class="particle"></span>
                    <span class="particle"></span>
                    <span class="particle"></span>
                    <span class="particle"></span>
                    <span class="particle"></span>
                    <span class="particle"></span>
                </div>

                <!-- Corner Decorations -->
                <div class="corner top-left"></div>
                <div class="corner top-right"></div>
                <div class="corner bottom-left"></div>
                <div class="corner bottom-right"></div>

                <!-- Header -->
                <div class="register-header">
                    <div class="cyber-lock">
                        <i class="bi bi-shield-lock-fill"></i>
                    </div>
                    <h2 class="glitch-title" data-text="CREATE ACCOUNT">CREATE ACCOUNT</h2>
                    <p class="subtitle">Join the secure network</p>
                </div>

                <!-- Register Form -->
                <form method="POST" action="{{ url_for('register') }}" class="cyber-form">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    
                    <!-- Username Field -->
                    <div class="form-group">
                        <label class="cyber-label">
                            <i class="bi bi-person-fill"></i>
                            Username
                        </label>
                        <div class="cyber-input-wrapper">
                            <input type="text" 
                                   class="cyber-input" 
                                   id="username"
                                   name="username" 
                                   placeholder="Enter username"
                                   required>
                            <span class="input-border"></span>
                        </div>
                    </div>

                    <!-- Email Field -->
                    <div class="form-group">
                        <label class="cyber-label">
                            <i class="bi bi-envelope-fill"></i>
                            Email Address
                        </label>
                        <div class="cyber-input-wrapper">
                            <input type="email" 
                                   class="cyber-input" 
                                   id="email"
                                   name="email" 
                                   placeholder="Enter email"
                                   required>
                            <span class="input-border"></span>
                        </div>
                    </div>

                    <!-- Password Field -->
                    <div class="form-group">
                        <label class="cyber-label">
                            <i class="bi bi-lock-fill"></i>
                            Password
                        </label>
                        <div class="cyber-input-wrapper">
                            <input type="password" 
                                   class="cyber-input" 
                                   id="password"
                                   name="password" 
                                   placeholder="Create password"
                                   required>
                            <span class="input-border"></span>
                            <span class="password-toggle" onclick="togglePassword()">
                                <i class="bi bi-eye"></i>
                            </span>
                        </div>
                    </div>

                    <!-- Terms Checkbox -->
                    <div class="terms-group">
                        <label class="cyber-checkbox">
                            <input type="checkbox" id="terms" required>
                            <span class="checkmark"></span>
                            <span class="terms-text">
                                I agree to the <a href="#" class="cyber-link">Terms</a> & <a href="#" class="cyber-link">Privacy</a>
                            </span>
                        </label>
                    </div>

                    <!-- Register Button -->
                    <button type="submit" class="cyber-register-btn" id="registerBtn">
                        <span class="btn-text">Register</span>
                        <span class="btn-glow"></span>
                    </button>

                    <!-- Sign In Link -->
                    <p class="signin-text">
                        <span>Already have an account?</span>
                        <a href="{{ url_for('login') }}" class="cyber-link">
                            Sign In <i class="bi bi-arrow-right-short"></i>
                        </a>
                    </p>
                </form>

                <!-- Security Badge -->
                <div class="security-badge">
                    <i class="bi bi-shield-check"></i>
                    <span>Secured by CyberShield</span>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
/* ===== REGISTER PAGE STYLES ===== */

.cyber-register-card {
    position: relative;
    background: rgba(10, 15, 20, 0.95);
    backdrop-filter: blur(10px);
    border: 2px solid #00ffff;
    padding: 2.5rem;
    overflow: hidden;
    animation: cardAppear 0.6s ease-out;
    box-shadow: 0 0 50px rgba(0, 255, 255, 0.2);
}

@keyframes cardAppear {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* Scanning Lines */
.scan-line {
    position: absolute;
    left: 0;
    width: 100%;
    height: 2px;
    background: linear-gradient(90deg, transparent, #00ffff, #ff00ff, #00ffff, transparent);
    opacity: 0.5;
    pointer-events: none;
}

.scan-1 {
    top: 0;
    animation: scanMove 4s linear infinite;
}

.scan-2 {
    bottom: 0;
    animation: scanMove 4s linear infinite reverse;
}

@keyframes scanMove {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
}

/* Floating Particles */
.floating-particles {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
}

.floating-particles .particle {
    position: absolute;
    width: 3px;
    height: 3px;
    background: #00ffff;
    border-radius: 50%;
    opacity: 0;
    animation: particleFloat 4s linear infinite;
}

.floating-particles .particle:nth-child(1) { top: 20%; left: 10%; animation-delay: 0s; }
.floating-particles .particle:nth-child(2) { top: 40%; right: 15%; animation-delay: 0.7s; }
.floating-particles .particle:nth-child(3) { bottom: 30%; left: 20%; animation-delay: 1.4s; }
.floating-particles .particle:nth-child(4) { bottom: 50%; right: 25%; animation-delay: 2.1s; }
.floating-particles .particle:nth-child(5) { top: 70%; left: 30%; animation-delay: 2.8s; }
.floating-particles .particle:nth-child(6) { bottom: 20%; right: 35%; animation-delay: 3.5s; }

@keyframes particleFloat {
    0% {
        transform: translateY(0) scale(1);
        opacity: 0;
    }
    10% {
        opacity: 1;
    }
    90% {
        opacity: 1;
    }
    100% {
        transform: translateY(-100px) scale(0);
        opacity: 0;
    }
}

/* Corner Decorations */
.corner {
    position: absolute;
    width: 25px;
    height: 25px;
    border: 2px solid #00ffff;
    animation: cornerPulse 2s ease-in-out infinite;
}

.corner.top-left {
    top: 10px;
    left: 10px;
    border-right: none;
    border-bottom: none;
}

.corner.top-right {
    top: 10px;
    right: 10px;
    border-left: none;
    border-bottom: none;
}

.corner.bottom-left {
    bottom: 10px;
    left: 10px;
    border-right: none;
    border-top: none;
}

.corner.bottom-right {
    bottom: 10px;
    right: 10px;
    border-left: none;
    border-top: none;
}

@keyframes cornerPulse {
    0%, 100% { 
        width: 25px;
        height: 25px;
        opacity: 1;
        border-color: #00ffff;
    }
    50% { 
        width: 35px;
        height: 35px;
        opacity: 0.7;
        border-color: #ff00ff;
    }
}

/* Header */
.register-header {
    text-align: center;
    margin-bottom: 2rem;
    position: relative;
    z-index: 2;
}

.cyber-lock {
    width: 70px;
    height: 70px;
    margin: 0 auto 1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
}

.cyber-lock i {
    font-size: 3rem;
    color: #00ffff;
    text-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
    animation: lockPulse 2s ease-in-out infinite;
}

@keyframes lockPulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.1); }
}

.glitch-title {
    font-size: 2rem;
    font-weight: 700;
    color: #fff;
    margin-bottom: 0.5rem;
    position: relative;
    animation: glitch 3s infinite;
}

.glitch-title::before,
.glitch-title::after {
    content: attr(data-text);
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
}

.glitch-title::before {
    color: #ff00ff;
    z-index: -1;
    animation: glitchOffset 0.3s infinite;
}

.glitch-title::after {
    color: #00ffff;
    z-index: -2;
    animation: glitchOffset 0.3s infinite reverse;
}

@keyframes glitch {
    2%, 64% { transform: skew(0deg); }
    4%, 60% { transform: skew(2deg); }
    62% { transform: skew(-2deg); }
}

@keyframes glitchOffset {
    0% { transform: translate(0); }
    20% { transform: translate(-2px, 2px); }
    40% { transform: translate(2px, -2px); }
    60% { transform: translate(-2px, -2px); }
    80% { transform: translate(2px, 2px); }
    100% { transform: translate(0); }
}

.subtitle {
    color: #888;
    font-size: 0.9rem;
    letter-spacing: 2px;
}

/* Form Groups */
.form-group {
    margin-bottom: 1.5rem;
    position: relative;
    z-index: 2;
}

/* Cyber Label */
.cyber-label {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    color: #00ffff;
    margin-bottom: 0.5rem;
    font-size: 0.9rem;
    text-transform: uppercase;
    letter-spacing: 1px;
}

.cyber-label i {
    font-size: 1rem;
    animation: labelGlow 2s ease-in-out infinite;
}

@keyframes labelGlow {
    0%, 100% { filter: drop-shadow(0 0 5px #00ffff); }
    50% { filter: drop-shadow(0 0 15px #00ffff); }
}

/* Input Wrapper */
.cyber-input-wrapper {
    position: relative;
    width: 100%;
}

/* Cyber Input */
.cyber-input {
    width: 100%;
    padding: 0.8rem 1rem;
    background: rgba(0, 0, 0, 0.5);
    border: none;
    color: #fff;
    font-size: 1rem;
    position: relative;
    z-index: 2;
    transition: all 0.3s;
}

.cyber-input:focus {
    outline: none;
    background: rgba(0, 0, 0, 0.7);
}

.cyber-input::placeholder {
    color: rgba(255, 255, 255, 0.3);
    font-size: 0.9rem;
}

/* Input Border Animation */
.input-border {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border: 2px solid #00ffff;
    pointer-events: none;
    transition: all 0.3s;
    animation: borderPulse 3s infinite;
}

@keyframes borderPulse {
    0%, 100% { 
        border-color: #00ffff;
        box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
    }
    50% { 
        border-color: #ff00ff;
        box-shadow: 0 0 20px rgba(255, 0, 255, 0.5);
    }
}

.cyber-input:focus + .input-border {
    border-color: #ff00ff;
    box-shadow: 0 0 30px rgba(255, 0, 255, 0.5);
    transform: scale(1.02);
}

/* Password Toggle */
.password-toggle {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: #00ffff;
    cursor: pointer;
    z-index: 3;
    transition: all 0.3s;
}

.password-toggle:hover {
    color: #ff00ff;
    transform: translateY(-50%) scale(1.1);
}

/* Terms Group */
.terms-group {
    margin: 1.5rem 0;
    position: relative;
    z-index: 2;
}

/* Cyber Checkbox */
.cyber-checkbox {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    cursor: pointer;
    position: relative;
}

.cyber-checkbox input {
    position: absolute;
    opacity: 0;
    cursor: pointer;
    height: 0;
    width: 0;
}

.checkmark {
    position: relative;
    height: 20px;
    width: 20px;
    background: rgba(0, 0, 0, 0.5);
    border: 2px solid #00ffff;
    transition: all 0.3s;
    flex-shrink: 0;
}

.cyber-checkbox:hover .checkmark {
    border-color: #ff00ff;
    box-shadow: 0 0 15px rgba(255, 0, 255, 0.5);
}

.cyber-checkbox input:checked ~ .checkmark {
    background: #00ffff;
    border-color: #00ffff;
    animation: checkPop 0.3s ease-out;
}

.checkmark:after {
    content: '';
    position: absolute;
    display: none;
    left: 6px;
    top: 2px;
    width: 5px;
    height: 10px;
    border: solid #0a0c0f;
    border-width: 0 2px 2px 0;
    transform: rotate(45deg);
}

.cyber-checkbox input:checked ~ .checkmark:after {
    display: block;
}

@keyframes checkPop {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.2); }
}

.terms-text {
    color: #e0e0e0;
    font-size: 0.9rem;
}

/* Cyber Link */
.cyber-link {
    color: #00ffff;
    text-decoration: none;
    position: relative;
    transition: all 0.3s;
}

.cyber-link:hover {
    color: #ff00ff;
    text-shadow: 0 0 10px rgba(255, 0, 255, 0.5);
}

.cyber-link i {
    transition: transform 0.3s;
}

.cyber-link:hover i {
    transform: translateX(5px);
}

/* Register Button */
.cyber-register-btn {
    position: relative;
    width: 100%;
    padding: 1rem;
    background: transparent;
    border: 2px solid #00ffff;
    color: #00ffff;
    font-family: inherit;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 2px;
    font-size: 1rem;
    cursor: pointer;
    overflow: hidden;
    transition: all 0.3s;
    margin-bottom: 1rem;
    position: relative;
    z-index: 2;
}

.btn-text {
    position: relative;
    z-index: 2;
}

.btn-glow {
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(0, 255, 255, 0.3), transparent);
    transition: left 0.5s;
    z-index: 1;
}

.cyber-register-btn:hover {
    background: #00ffff;
    color: #0a0c0f;
    border-color: #00ffff;
    box-shadow: 0 0 30px rgba(0, 255, 255, 0.8);
    transform: translateY(-2px);
}

.cyber-register-btn:hover .btn-glow {
    left: 100%;
}

.cyber-register-btn:active {
    transform: translateY(0);
}

/* Sign In Text */
.signin-text {
    text-align: center;
    color: #888;
    font-size: 0.9rem;
    margin: 1rem 0 0;
}

/* Security Badge */
.security-badge {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    margin-top: 2rem;
    padding-top: 1rem;
    border-top: 1px solid rgba(0, 255, 255, 0.2);
    color: #888;
    font-size: 0.8rem;
    position: relative;
    z-index: 2;
}

.security-badge i {
    color: #00ff00;
    animation: shieldGlow 2s ease-in-out infinite;
}

@keyframes shieldGlow {
    0%, 100% { filter: drop-shadow(0 0 5px #00ff00); }
    50% { filter: drop-shadow(0 0 15px #00ff00); }
}

/* Responsive */
@media (max-width: 768px) {
    .cyber-register-card {
        padding: 1.5rem;
    }
    
    .glitch-title {
        font-size: 1.5rem;
    }
    
    .floating-particles .particle {
        display: none;
    }
}
</style>

<script>
// Password Toggle Function
function togglePassword() {
    const passwordInput = document.getElementById('password');
    const toggleIcon = document.querySelector('.password-toggle i');
    
    if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        toggleIcon.className = 'bi bi-eye-slash';
    } else {
        passwordInput.type = 'password';
        toggleIcon.className = 'bi bi-eye';
    }
}

// Button Click Animation
document.addEventListener('DOMContentLoaded', function() {
    const registerBtn = document.getElementById('registerBtn');
    
    if (registerBtn) {
        registerBtn.addEventListener('click', function(e) {
            // Add click effect
            this.style.transform = 'scale(0.98)';
            setTimeout(() => {
                this.style.transform = '';
            }, 200);
        });
    }
    
    // Input focus effects
    const inputs = document.querySelectorAll('.cyber-input');
    inputs.forEach(input => {
        input.addEventListener('focus', function() {
            this.parentElement.querySelector('.input-border').style.transform = 'scale(1.02)';
        });
        
        input.addEventListener('blur', function() {
            this.parentElement.querySelector('.input-border').style.transform = 'scale(1)';
        });
    });
});
</script>
{% endblock %}
